name: Dashboard (Next.js)

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: dashboard

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Build (verifies Next compiles)
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
          CLERK_DISABLED: "true"
          HEIMDALL_API_URL: "http://127.0.0.1:8000"
        run: npm run build

  # Vercel auto-deploys via its GitHub integration once this check is green.
  # Production:  https://heimdall-dashboard-nu.vercel.app
  # Preview:     https://heimdall-dashboard-<sha>-yokeshkumar.vercel.app  (per PR)
