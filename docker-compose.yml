# Heimdall — full stack.
#
#   docker compose up --build
#
# Brings up:
#   * heimdall      — FastAPI proxy + telemetry (port 8000)
#   * dashboard     — Next.js operations console (port 3000)
#   * ollama        — Llama Guard 3 inference (port 11434)
#   * ollama-pull   — one-shot init that pulls the model on first run
#
# After it's healthy, open http://localhost:3000

services:
  heimdall:
    build:
      context: .
      dockerfile: Dockerfile
    image: heimdall-backend:latest
    container_name: heimdall
    restart: unless-stopped
    environment:
      # Single-user self-host defaults — override in .env to switch modes.
      MULTI_TENANT_MODE: ${MULTI_TENANT_MODE:-false}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/heimdall.sqlite3}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com/v1}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      SEMANTIC_ENABLED: ${SEMANTIC_ENABLED:-true}
      SEMANTIC_BASE_URL: http://ollama:11434/v1
      SEMANTIC_MODEL: ${SEMANTIC_MODEL:-llama-guard3}
      SEMANTIC_FAIL_CLOSED: ${SEMANTIC_FAIL_CLOSED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POLICY_DEFAULT_FP_THRESHOLD: ${POLICY_DEFAULT_FP_THRESHOLD:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    ports:
      - "8000:8000"
    volumes:
      - heimdall-telemetry:/data
    depends_on:
      ollama-pull:
        condition: service_completed_successfully

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: heimdall-dashboard:latest
    container_name: heimdall-dashboard
    restart: unless-stopped
    environment:
      HEIMDALL_API_URL: http://heimdall:8000
      HEIMDALL_API_TOKEN: ${HEIMDALL_API_TOKEN:-}
      CLERK_DISABLED: ${CLERK_DISABLED:-true}
      NEXT_PUBLIC_CLERK_DISABLED: ${CLERK_DISABLED:-true}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - heimdall

  ollama:
    image: ollama/ollama:latest
    container_name: heimdall-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment to enable GPU acceleration (requires nvidia-container-toolkit).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-pull:
    image: ollama/ollama:latest
    container_name: heimdall-ollama-pull
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: ollama:11434
      OLLAMA_MODEL: ${SEMANTIC_MODEL:-llama-guard3}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama at $$OLLAMA_HOST...";
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        echo "Pulling $$OLLAMA_MODEL...";
        ollama pull "$$OLLAMA_MODEL";
        echo "Model ready.";
    restart: "no"

volumes:
  heimdall-telemetry:
  ollama-data:
