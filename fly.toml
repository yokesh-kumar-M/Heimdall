# Fly.io configuration for the Heimdall FastAPI backend.
#
# First-time setup:
#   fly launch --no-deploy        (or `fly apps create heimdall-api`)
#   fly volumes create heimdall_data --size 1 --region ord
#   fly secrets set DATABASE_URL="postgresql+asyncpg://..." CLERK_JWKS_URL=... etc.
#   fly deploy

app = "heimdall-api"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"
  LOG_LEVEL = "INFO"
  LOG_FORMAT = "json"
  MULTI_TENANT_MODE = "true"
  SENTRY_ENVIRONMENT = "production"

[[mounts]]
  source = "heimdall_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = "20s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
